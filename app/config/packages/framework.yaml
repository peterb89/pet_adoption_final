framework:
    secret: '%env(APP_SECRET)%'

    session:
        enabled: true
        handler_id: null
        cookie_secure: auto
        cookie_httponly: true
        cookie_samesite: lax
        save_path: '%kernel.project_dir%/var/sessions/%kernel.environment%'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file